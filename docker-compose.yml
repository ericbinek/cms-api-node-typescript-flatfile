name: cms-api-node-typescript-flatfile

services:
  app:
    container_name: cms-api-node-typescript-flatfile
    build: .
    ports:
      - "3008:3008"
    volumes:
      - ./data:/app/data
    environment:
      PORT: "3008"
      DATA_DIR: /app/data
      ADMIN_USER: "${ADMIN_USER:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
