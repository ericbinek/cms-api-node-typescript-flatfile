name: Idea or feature request
description: Suggest a direction for the project
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you like to see, and why?
    validations:
      required: true
  - type: textarea
    id: fit
    attributes:
      label: Fit with the project
      description: This project stays dependency free at runtime and schema.org aligned, runs on Node.js and its standard library alone, and keeps TypeScript within the erasable-types subset. How does your idea fit that?
    validations:
      required: false
