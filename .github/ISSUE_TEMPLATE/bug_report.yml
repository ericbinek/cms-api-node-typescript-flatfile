name: Bug report
description: Something does not behave the way the conformance tests would suggest
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. This is a work in progress, so please include enough detail to reproduce.
  - type: textarea
    id: summary
    attributes:
      label: What happened
      description: What did you do, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A request against a running server is ideal.
      render: shell
      placeholder: |
        node src/server.ts
        curl http://localhost:3008/blog-postings
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v24.0.0"
    validations:
      required: true
